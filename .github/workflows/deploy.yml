name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'              # Source files
      - 'nuxt.config.ts'     # Nuxt configuration
      - 'package.json'        # Package configuration
      - 'pnpm-lock.yaml'      # Lock file
      - 'tsconfig.json'      # TypeScript configuration
      - 'app.config.ts'      # App configuration
      - '.github/workflows/deploy.yml' # Workflow file itself
  workflow_dispatch:

# Sets permissions of GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute base URL from repository name
        id: base_url
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "url=/" >> "$GITHUB_OUTPUT"
          else
            echo "url=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate static site
        run: pnpm run generate
        env:
          NUXT_PUBLIC_BASE_URL: ${{ steps.base_url.outputs.url }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
